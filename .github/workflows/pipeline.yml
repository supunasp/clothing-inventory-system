name: Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: false

jobs:
  backend-test:
    name: Backend tests
    # Skip the bot's release commit so the version-bump push doesn't recurse.
    if: "github.event_name == 'pull_request' || !contains(github.event.head_commit.message, 'chore(release):')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        run: npm test
        env:
          JWT_SECRET: ci-test-secret

  frontend-build:
    name: Frontend build
    if: "github.event_name == 'pull_request' || !contains(github.event.head_commit.message, 'chore(release):')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          CI: 'false'

  release:
    name: Bump version and tag
    needs: [backend-test, frontend-build]
    # Release only on direct pushes to main, never on PRs or the release commit itself.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.bump.outputs.new_tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version and create tag
        id: bump
        run: |
          npm version patch -m "chore(release): %s"
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Push commit and tag
        run: |
          git push origin main
          git push origin --tags

  deploy-test:
    name: Deploy to test (EC2)
    needs: release
    # Manual approval is enforced by the `test` GitHub Environment's required reviewers.
    # Configure under: Repo Settings -> Environments -> test -> Required reviewers.
    environment: test
    runs-on: self-hosted
    # Backend and frontend share one job so a single actions/checkout runs.
    # Two checkouts on the same runner workspace would `git clean -ffdx` each
    # other's node_modules, breaking the still-running pm2 process.

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.new_tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend prod deps
        working-directory: backend
        run: npm ci --omit=dev

      - name: Write backend .env from secrets
        working-directory: backend
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          PORT: ${{ secrets.PORT }}
        run: |
          umask 077
          {
            printf 'MONGO_URI=%s\n' "$MONGO_URI"
            printf 'JWT_SECRET=%s\n' "$JWT_SECRET"
            printf 'PORT=%s\n' "$PORT"
          } > .env

      - name: Reload backend with pm2
        working-directory: backend
        run: |
          pm2 reload clothing-inventory-backend --update-env \
            || pm2 start server.js --name clothing-inventory-backend --update-env
          pm2 save

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          CI: 'false'
          # Same-origin call: nginx proxies /api/* on this EC2 to the backend
          # process on localhost:5001, so the bundle uses a relative base URL.
          REACT_APP_API_URL: /api
        run: npm run build

      - name: Reload frontend with pm2
        working-directory: frontend
        run: |
          pm2 reload clothing-inventory-frontend --update-env \
            || pm2 serve build 3000 --name clothing-inventory-frontend --spa
          pm2 save
